  function getStatus(c) {
    const docsStatus = c.docsLoaded === 0 ? 'danger' : (c.docsLoaded < c.docsTotal ? 'warning' : 'ok');
    const reqStatus  = c.reqLoaded  === 0 ? 'danger' : (c.reqLoaded  < c.reqTotal  ? 'warning' : 'ok');
    if (docsStatus === 'danger' || reqStatus === 'danger') return 'danger';
    if (docsStatus === 'warning' || reqStatus === 'warning') return 'warning';
    return 'ok';
  }

  function getFractionClass(loaded, total) {
    if (loaded === 0)     return 'text-red-600 font-medium';
    if (loaded < total)   return 'text-amber-600 font-medium';
    return 'text-green-600 font-medium';
  }

  function getRowClasses(status) {
    if (status === 'danger')  return 'border-l-4 border-red-500 bg-red-50 hover:bg-red-100/50';
    if (status === 'warning') return 'border-l-4 border-amber-400 bg-amber-50 hover:bg-amber-100/50';
    return 'border-l-4 border-transparent hover:bg-gray-50';
  }

  // ─── State ────────────────────────────────────────────────────────
  let sortCol = 'name';
  let sortDir = 'asc';
  let searchQuery = '';
  let statusFilter = 'all';

  // ─── Render ───────────────────────────────────────────────────────
  function renderTable() {
    let data = clients.slice();

    // Filter by search
    if (searchQuery) {
      const q = searchQuery.toLowerCase();
      data = data.filter(c => c.name.toLowerCase().includes(q));
    }

    // Filter by status
    if (statusFilter !== 'all') {
      data = data.filter(c => getStatus(c) === statusFilter);
    }

    // Sort
    data.sort((a, b) => {
      let va, vb;
      switch (sortCol) {
        case 'name':     va = a.name;     vb = b.name;     break;
        case 'contract': va = a.contract; vb = b.contract; break;
        case 'case':     va = a.caseNo;   vb = b.caseNo;   break;
        case 'docs':     va = a.docsLoaded / (a.docsTotal || 1); vb = b.docsLoaded / (b.docsTotal || 1); break;
        case 'required': va = a.reqLoaded  / (a.reqTotal  || 1); vb = b.reqLoaded  / (b.reqTotal  || 1); break;
        case 'region':   va = a.region;   vb = b.region;   break;
        default:         va = a.name;     vb = b.name;
      }
      if (va < vb) return sortDir === 'asc' ? -1 : 1;
      if (va > vb) return sortDir === 'asc' ? 1 : -1;
      return 0;
    });

    const tbody = document.getElementById('clients-tbody');
    const info  = document.getElementById('pagination-info');
    const total  = data.length;
    info.textContent = total > 0
      ? `Показано 1–${total} из ${total} записей`
      : 'Нет записей';

    if (total === 0) {
      tbody.innerHTML = `
        <tr>
          <td colspan="6" class="px-4 py-10 text-center text-sm text-gray-400">Клиенты не найдены</td>
        </tr>`;
      return;
    }

    tbody.innerHTML = data.map(c => {
      const status     = getStatus(c);
      const rowClass   = getRowClasses(status);
      const docsCls    = getFractionClass(c.docsLoaded, c.docsTotal);
      const reqCls     = getFractionClass(c.reqLoaded,  c.reqTotal);
      return `
        <tr class="${rowClass} transition-colors">
          <td class="px-4 py-3 whitespace-nowrap">
            <a href="#" class="text-indigo-600 hover:text-indigo-700 hover:underline font-medium">${c.name}</a>
          </td>
          <td class="px-4 py-3 whitespace-nowrap text-gray-600">${c.contract}</td>
          <td class="px-4 py-3 whitespace-nowrap text-gray-600">${c.caseNo}</td>
          <td class="px-4 py-3 whitespace-nowrap">
            <span class="${docsCls}">${c.docsLoaded} / ${c.docsTotal}</span>
          </td>
          <td class="px-4 py-3 whitespace-nowrap">
            <span class="${reqCls}">${c.reqLoaded} / ${c.reqTotal}</span>
          </td>
          <td class="px-4 py-3 whitespace-nowrap text-gray-600">${c.region}</td>
        </tr>`;
    }).join('');
  }

  // ─── Sort icon render ─────────────────────────────────────────────
  function renderSortIcons() {
    document.querySelectorAll('.sort-icon').forEach(el => {
      const col = el.dataset.col;
      if (col === sortCol) {
        if (sortDir === 'asc') {
          el.innerHTML = `<svg class="w-3.5 h-3.5 text-indigo-500" fill="currentColor" viewBox="0 0 24 24"><path d="M12 5l7 7H5l7-7z"/></svg>`;
        } else {
          el.innerHTML = `<svg class="w-3.5 h-3.5 text-indigo-500" fill="currentColor" viewBox="0 0 24 24"><path d="M12 19l-7-7h14l-7 7z"/></svg>`;
        }
      } else {
        el.innerHTML = `<svg class="w-3.5 h-3.5 text-gray-300" fill="currentColor" viewBox="0 0 24 24"><path d="M12 5l7 7H5l7-7zM12 19l-7-7h14l-7 7z"/></svg>`;
      }
    });
  }

  // ─── Event: sort headers ──────────────────────────────────────────
  document.querySelectorAll('thead button[data-col]').forEach(btn => {
    btn.addEventListener('click', () => {
      const col = btn.dataset.col;
      if (sortCol === col) {
        sortDir = sortDir === 'asc' ? 'desc' : 'asc';
      } else {
        sortCol = col;
        sortDir = 'asc';
      }
      renderSortIcons();
      renderTable();
    });
  });

  // ─── Event: search ────────────────────────────────────────────────
  document.getElementById('search-input').addEventListener('input', e => {
    searchQuery = e.target.value.trim();
    renderTable();
  });

  // ─── Event: status filter ─────────────────────────────────────────
  document.getElementById('status-filter').addEventListener('change', e => {
    statusFilter = e.target.value;
    renderTable();
  });

  // ─── Initial render ───────────────────────────────────────────────
  renderSortIcons();
  renderTable();
</script>

</body>
</html>
