<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ЮрКлик — Пользователи</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = { theme: { extend: { fontFamily: { sans: ["Inter", "ui-sans-serif", "system-ui"] } } } };
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/flowbite/2.5.2/flowbite.min.css" />
  </head>
  <body class="bg-gray-50 font-sans text-gray-900 antialiased">
    <div id="app-shell" data-page="users" data-title="Пользователи"></div>

    <div id="page-source">
      <!-- Toolbar -->
      <div class="flex flex-wrap items-center justify-between gap-3 mb-5">
        <div class="flex items-center gap-2">
          <div class="relative">
            <svg class="w-4 h-4 absolute left-3 top-1/2 -translate-y-1/2 text-gray-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
            <input type="text" placeholder="Поиск по пользователям" class="h-10 w-72 max-w-full pl-9 pr-3 rounded-lg border border-gray-200 bg-white text-sm placeholder:text-gray-400 focus:outline-none focus:ring-2 focus:ring-indigo-200 focus:border-indigo-400" />
          </div>
        </div>
        <div class="flex items-center gap-2">
          <button type="button" class="inline-flex items-center gap-2 h-10 px-3 rounded-lg border border-gray-200 bg-white text-sm text-gray-700 hover:bg-gray-50">
            <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="7" r="3"/><circle cx="17" cy="7" r="3"/><path d="M2 21c0-3.3 2.7-6 6-6"/><path d="M11 21c0-3.3 2.7-6 6-6"/></svg>
            Создать роль
          </button>
          <button id="invite-btn" type="button" class="inline-flex items-center gap-2 h-10 px-4 rounded-lg bg-indigo-600 hover:bg-indigo-700 text-white text-sm">
            <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14"/><path d="M5 12h14"/></svg>
            Пригласить пользователя
          </button>
        </div>
      </div>

      <!-- Таблица -->
      <div class="bg-white rounded-xl border border-gray-200 overflow-hidden">
        <div class="overflow-x-auto">
          <table class="min-w-full text-sm">
            <thead class="bg-[#f3f4f6] text-gray-600">
              <tr>
                <th class="w-10 px-4 py-3 text-left">
                  <label class="toggle-slider inline-flex items-center">
                    <input type="checkbox" class="peer sr-only" />
                    <span class="w-4 h-4 rounded border border-gray-300 bg-white peer-checked:bg-indigo-600 peer-checked:border-indigo-600 inline-flex items-center justify-center">
                      <svg class="w-3 h-3 text-white opacity-0 peer-checked:opacity-100" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12l5 5 9-11"/></svg>
                    </span>
                  </label>
                </th>
                <th class="px-4 py-3 text-left">ФИО</th>
                <th class="px-4 py-3 text-left">Роль</th>
                <th class="px-4 py-3 text-left">Email</th>
                <th class="px-4 py-3 text-left">Дел в работе</th>
                <th class="px-4 py-3 text-left">Статус</th>
                <th class="px-4 py-3 text-right">Действия</th>
              </tr>
            </thead>
            <tbody id="users-tbody" class="divide-y divide-gray-100"></tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- Панель прав (выезжает справа) -->
    <div id="rights-overlay" class="hidden fixed inset-0 z-40 bg-gray-900/40"></div>
    <aside id="rights-panel" class="fixed top-0 right-0 z-50 h-full w-full max-w-md bg-white border-l border-gray-200 translate-x-full transition-transform flex flex-col">
      <div class="flex items-center justify-between p-5 border-b border-gray-200">
        <div>
          <h2 class="text-base text-gray-900">Права пользователя</h2>
          <p class="text-sm text-gray-500" id="rights-user-name">—</p>
        </div>
        <button id="rights-close" type="button" class="w-9 h-9 inline-flex items-center justify-center rounded-lg text-gray-500 hover:bg-gray-100">
          <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M6 6l12 12"/><path d="M18 6l-12 12"/></svg>
        </button>
      </div>
      <div class="flex-1 overflow-y-auto p-5 space-y-6" id="rights-body"></div>
      <div class="p-5 border-t border-gray-200 flex items-center justify-end gap-2">
        <button type="button" id="rights-cancel" class="h-10 px-4 rounded-lg border border-gray-200 text-sm text-gray-700 hover:bg-gray-50">Отмена</button>
        <button type="button" class="h-10 px-4 rounded-lg bg-indigo-600 hover:bg-indigo-700 text-white text-sm">Сохранить</button>
      </div>
    </aside>

    <!-- Панель подтверждения удаления -->
    <div id="delete-overlay" class="hidden fixed inset-0 z-40 bg-gray-900/40"></div>
    <aside id="delete-panel" class="fixed top-0 right-0 z-50 h-full w-full max-w-sm bg-white border-l border-gray-200 translate-x-full transition-transform flex flex-col">
      <div class="flex items-center justify-between p-5 border-b border-gray-200">
        <h2 class="text-base text-gray-900">Удаление пользователя</h2>
        <button id="delete-close" type="button" class="w-9 h-9 inline-flex items-center justify-center rounded-lg text-gray-500 hover:bg-gray-100">
          <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M6 6l12 12"/><path d="M18 6l-12 12"/></svg>
        </button>
      </div>
      <div class="p-5 flex-1 space-y-3">
        <p class="text-sm text-gray-700">Вы собираетесь удалить пользователя <span id="delete-user-name" class="text-gray-900">—</span>. Это действие нельзя отменить.</p>
        <p class="text-sm text-gray-500">Все назначенные дела будут переданы администратору.</p>
      </div>
      <div class="p-5 border-t border-gray-200 flex items-center justify-end gap-2">
        <button type="button" id="delete-cancel" class="h-10 px-4 rounded-lg border border-gray-200 text-sm text-gray-700 hover:bg-gray-50">Отмена</button>
        <button type="button" class="h-10 px-4 rounded-lg bg-rose-600 hover:bg-rose-700 text-white text-sm">Удалить</button>
      </div>
    </aside>

    <script src="assets/layout.js"></script>
    <script>
      const USERS = [
        { name: "Анна Иванова", role: "Старший юрист", email: "a.ivanova@corp.ru", cases: 34, status: "active" },
        { name: "Пётр Смирнов", role: "Юрист", email: "p.smirnov@corp.ru", cases: 21, status: "active" },
        { name: "Елена Кузнецова", role: "Помощник юриста", email: "e.kuznecova@corp.ru", cases: 9, status: "active" },
        { name: "Дмитрий Лебедев", role: "Юрист", email: "d.lebedev@corp.ru", cases: 17, status: "invited" },
        { name: "Ольга Соколова", role: "Старший юрист", email: "o.sokolova@corp.ru", cases: 28, status: "active" },
        { name: "Михаил Новиков", role: "Юрист", email: "m.novikov@corp.ru", cases: 12, status: "blocked" },
      ];

      const RIGHTS = [
        { title: "Управление делами", items: ["Создавать дела", "Редактировать дела", "Закрывать дела", "Удалять дела"] },
        { title: "Документы", items: ["Загружать документы", "Скачивать документы", "Подписывать документы"] },
        { title: "Клиенты", items: ["Просматривать клиентов", "Редактировать клиентов", "Общаться с клиентами"] },
        { title: "Отчёты и аналитика", items: ["Просматривать дашборд", "Экспортировать данные"] },
        { title: "Финансы", items: ["Создавать счета", "Создавать юридические лица"] },
        { title: "Брендинг", items: ["Изменять брендинг"] },
      ];

      const STATUS = {
        active: { label: "Активен", dot: "bg-emerald-500", text: "text-emerald-700" },
        invited: { label: "Приглашён", dot: "bg-amber-500", text: "text-amber-700" },
        blocked: { label: "Заблокирован", dot: "bg-gray-400", text: "text-gray-600" },
      };

      document.addEventListener("layout:ready", () => {
        // Рендер строк
        const tbody = document.getElementById("users-tbody");
        tbody.innerHTML = USERS.map((u, idx) => {
          const s = STATUS[u.status];
          return `
            <tr class="hover:bg-gray-50" data-idx="${idx}">
              <td class="px-4 py-3">
                <label class="toggle-slider inline-flex items-center">
                  <input type="checkbox" class="peer sr-only row-check" />
                  <span class="w-4 h-4 rounded border border-gray-300 bg-white peer-checked:bg-indigo-600 peer-checked:border-indigo-600 inline-flex items-center justify-center">
                    <svg class="w-3 h-3 text-white opacity-0 peer-checked:opacity-100" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12l5 5 9-11"/></svg>
                  </span>
                </label>
              </td>
              <td class="px-4 py-3 text-gray-900">${u.name}</td>
              <td class="px-4 py-3 text-gray-700">${u.role}</td>
              <td class="px-4 py-3 text-gray-700">${u.email}</td>
              <td class="px-4 py-3 text-gray-700">${u.cases}</td>
              <td class="px-4 py-3">
                <span class="inline-flex items-center gap-1.5 text-xs ${s.text}">
                  <span class="w-1.5 h-1.5 rounded-full ${s.dot}"></span>${s.label}
                </span>
              </td>
              <td class="px-4 py-3 text-right">
                <div class="inline-flex items-center gap-1">
                  <button type="button" class="w-8 h-8 rounded-lg text-gray-500 hover:bg-gray-100 hover:text-indigo-600 edit-btn" title="Редактировать права">
                    <svg class="w-4 h-4 mx-auto" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 20h4l10-10-4-4L4 16v4z"/><path d="M13.5 6.5l4 4"/></svg>
                  </button>
                  <button type="button" class="w-8 h-8 rounded-lg text-gray-500 hover:bg-gray-100 hover:text-rose-600 delete-btn" title="Удалить">
                    <svg class="w-4 h-4 mx-auto" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 7h16"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M6 7l1 13a2 2 0 0 0 2 2h6a2 2 0 0 0 2-2l1-13"/><path d="M9 7V4h6v3"/></svg>
                  </button>
                </div>
              </td>
            </tr>
          `;
        }).join("");

        // Выделение строки при чекбоксе
        tbody.querySelectorAll(".row-check").forEach((cb) => {
          cb.addEventListener("change", (e) => {
            const row = e.target.closest("tr");
            row.classList.toggle("bg-gray-100", e.target.checked);
          });
        });

        // Панель прав
        const rightsOverlay = document.getElementById("rights-overlay");
        const rightsPanel = document.getElementById("rights-panel");
        const rightsBody = document.getElementById("rights-body");
        const rightsName = document.getElementById("rights-user-name");

        rightsBody.innerHTML = RIGHTS.map(
          (cat) => `
          <div>
            <h3 class="text-sm text-gray-900 mb-3">${cat.title}</h3>
            <ul class="space-y-2.5">
              ${cat.items
                .map(
                  (item, i) => `
                <li class="flex items-center justify-between">
                  <span class="text-sm text-gray-700">${item}</span>
                  <label class="toggle-slider relative inline-flex items-center cursor-pointer">
                    <input type="checkbox" class="peer sr-only" ${i % 2 === 0 ? "checked" : ""} />
                    <span class="w-10 h-5 bg-gray-200 rounded-full peer-checked:bg-indigo-600 transition-colors"></span>
                    <span class="absolute left-0.5 top-0.5 w-4 h-4 rounded-full bg-white shadow transition-transform peer-checked:translate-x-5"></span>
                  </label>
                </li>`
                )
                .join("")}
            </ul>
          </div>`
        ).join("");

        const openRights = (name) => {
          rightsName.textContent = name;
          rightsOverlay.classList.remove("hidden");
          requestAnimationFrame(() => rightsPanel.classList.remove("translate-x-full"));
        };
        const closeRights = () => {
          rightsPanel.classList.add("translate-x-full");
          setTimeout(() => rightsOverlay.classList.add("hidden"), 300);
        };
        document.getElementById("rights-close").addEventListener("click", closeRights);
        document.getElementById("rights-cancel").addEventListener("click", closeRights);
        rightsOverlay.addEventListener("click", closeRights);

        // Панель удаления
        const delOverlay = document.getElementById("delete-overlay");
        const delPanel = document.getElementById("delete-panel");
        const delName = document.getElementById("delete-user-name");
        const openDelete = (name) => {
          delName.textContent = name;
          delOverlay.classList.remove("hidden");
          requestAnimationFrame(() => delPanel.classList.remove("translate-x-full"));
        };
        const closeDelete = () => {
          delPanel.classList.add("translate-x-full");
          setTimeout(() => delOverlay.classList.add("hidden"), 300);
        };
        document.getElementById("delete-close").addEventListener("click", closeDelete);
        document.getElementById("delete-cancel").addEventListener("click", closeDelete);
        delOverlay.addEventListener("click", closeDelete);

        tbody.addEventListener("click", (e) => {
          const editBtn = e.target.closest(".edit-btn");
          const delBtn = e.target.closest(".delete-btn");
          if (editBtn) {
            const idx = editBtn.closest("tr").dataset.idx;
            openRights(USERS[idx].name);
          }
          if (delBtn) {
            const idx = delBtn.closest("tr").dataset.idx;
            openDelete(USERS[idx].name);
          }
        });

        // Кнопка пригласить — тоже открывает правую панель
        document.getElementById("invite-btn").addEventListener("click", () => openRights("Новый пользователь"));
      });
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/flowbite/2.5.2/flowbite.min.js"></script>
  </body>
</html>
